<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <h1>Language Learning App</h1>

<div class="card">
    <h2 id="word">Hello</h2>
    <button onclick="showMeaning()">Show Meaning</button>
    <p id="meaning"></p>
</div>

<div class="quiz">
    <h2>Quiz</h2>
    <p>What is the meaning of "Hola"?</p>

    <button onclick="checkAnswer('Hello')">Hello</button>
    <button onclick="checkAnswer('Bye')">Bye</button>
    <button onclick="checkAnswer('Thanks')">Thanks</button>

    <p id="result"></p>
</div>
    
    <script src="./js/script.js"></script>
</body>
</html>
